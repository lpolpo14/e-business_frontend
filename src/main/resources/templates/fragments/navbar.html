<nav th:fragment="navbar"
     class="flex justify-between items-center px-8 py-5 border-b border-slate-800 bg-slate-950 text-white">

    <a th:href="@{/}" class="text-2xl font-bold">D3FENDer</a>

    <div class="space-x-6 flex items-center">

        <a th:href="@{/}" class="hover:text-blue-400">Home</a>
        <a th:href="@{/dashboard}" class="hover:text-blue-400">Dashboard</a>

        <!-- NOT authenticated -->
        <a th:if="${#authentication == null or #authentication.name == 'anonymousUser'}"
           th:href="@{/login}"
           class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-700">
            Login / Register
        </a>

        <!-- Authenticated -->
        <form th:if="${#authentication != null and #authentication.name != 'anonymousUser'}"
              th:action="@{/logout}" method="post" class="inline">
            <button type="submit"
                    class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700">
                Logout
            </button>
        </form>

    </div>

</nav>
