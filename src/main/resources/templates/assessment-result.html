<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Assessment Result - D3FENDer</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>

<body class="bg-slate-950 text-white min-h-screen">

<nav class="flex justify-between items-center px-8 py-5 border-b border-slate-800">
    <a th:href="@{/}" class="text-2xl font-bold">D3FENDer</a>

    <div class="space-x-6">
        <a th:href="@{/}" class="hover:text-blue-400">Home</a>
        <a th:href="@{/assessment}" class="hover:text-blue-400">New Assessment</a>

        <form th:action="@{/logout}" method="post" class="inline">
            <button type="submit" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700">
                Logout
            </button>
        </form>
    </div>
</nav>

<main class="max-w-4xl mx-auto px-10 md:px-12 py-16">

    <div class="mb-12 pl-2">
        <h1 class="text-5xl font-bold mb-4">Assessment Results</h1>
        <p class="text-lg text-slate-400">
            D3FENDer identified
            <span class="text-white font-semibold" th:text="${response.findings_count}"></span>
            potential defensive gaps.
        </p>
    </div>

    <div class="grid grid-cols-1 gap-6 mb-14">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl px-8 py-6">
            <p class="text-slate-400 text-sm mb-2">Total Findings</p>
            <p class="text-4xl font-bold" th:text="${response.findings_count}"></p>
        </div>
    </div>

    <div class="space-y-10">

        <article th:each="finding : ${response.findings}"
                 class="bg-slate-900 border border-slate-800 rounded-3xl px-10 py-8 shadow-lg">

            <div class="flex flex-col md:flex-row md:justify-between md:items-start gap-4 mb-8">

                <div>
                    <h2 class="text-2xl font-bold mb-2" th:text="${finding['title']}">
                        Finding Title
                    </h2>

                    <p class="text-slate-500 text-sm font-mono" th:text="${finding['rule_id']}">
                        RULE.ID
                    </p>
                </div>

                <span class="w-fit px-4 py-1.5 rounded-full text-sm font-bold"
                      th:text="${#strings.toUpperCase(finding['severity'])}"
                      th:classappend="
                        ${finding['severity'] == 'high'} ? ' bg-red-950/70 text-red-200' :
                        (${finding['severity'] == 'medium'} ? ' bg-yellow-950/70 text-yellow-200' :
                        ' bg-green-950/70 text-green-200')">
                    HIGH
                </span>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">

                <section class="bg-slate-950/50 rounded-2xl px-6 py-5">
                    <h3 class="text-sm uppercase tracking-wide text-slate-500 mb-3">
                        Description
                    </h3>
                    <p class="text-slate-300 leading-relaxed" th:text="${finding['description']}"></p>
                </section>

                <section class="bg-blue-950/20 rounded-2xl px-6 py-5">
                    <h3 class="text-sm uppercase tracking-wide text-blue-300 mb-3">
                        Recommendation
                    </h3>
                    <p class="text-slate-100 leading-relaxed" th:text="${finding['recommendation']}"></p>
                </section>

            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

                <section>
                    <h3 class="text-sm uppercase tracking-wide text-slate-500 mb-3">
                        Missing Capabilities
                    </h3>

                    <div class="flex flex-wrap gap-2">
                        <span th:each="cap : ${finding['missing_capabilities']}"
                              th:text="${cap}"
                              class="bg-slate-800/70 text-slate-200 px-3 py-1.5 rounded-full text-sm font-mono">
                        </span>
                    </div>
                </section>

                <section>
                    <h3 class="text-sm uppercase tracking-wide text-slate-500 mb-3">
                        ATT&CK Techniques
                    </h3>

                    <div class="flex flex-wrap gap-2">
                        <span th:each="tech : ${finding['attack_techniques']}"
                              th:text="${tech}"
                              class="bg-red-950/60 text-red-200 px-3 py-1.5 rounded-full text-sm font-mono">
                        </span>
                    </div>
                </section>

                <section>
                    <h3 class="text-sm uppercase tracking-wide text-slate-500 mb-3">
                        D3FEND Techniques
                    </h3>

                    <div class="flex flex-wrap gap-2">
                        <span th:each="tech : ${finding['d3fend_techniques']}"
                              th:text="${tech}"
                              class="bg-blue-950/60 text-blue-200 px-3 py-1.5 rounded-full text-sm font-mono">
                        </span>
                    </div>
                </section>

            </div>

            <details class="bg-slate-950/50 rounded-2xl px-6 py-5">
                <summary class="cursor-pointer text-slate-300 hover:text-white font-medium">
                    View Evidence
                </summary>

                <div class="mt-4 space-y-2">
                    <div th:each="entry : ${finding['evidence']}"
                         class="flex justify-between gap-4 border-b border-slate-800 pb-2 last:border-b-0">

                        <span class="text-slate-400 font-mono text-sm" th:text="${entry.key}"></span>

                        <span class="font-mono text-sm"
                              th:text="${entry.value}"
                              th:classappend="${entry.value} ? ' text-green-400' : ' text-red-400'">
                        </span>
                    </div>
                </div>
            </details>

        </article>

    </div>

    <div class="mt-14 pl-2">
        <a th:href="@{/assessment}"
           class="inline-block bg-blue-600 px-6 py-3 rounded-lg font-semibold hover:bg-blue-700">
            Run Another Assessment
        </a>
    </div>

</main>

</body>
</html>
