<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - D3FENDer</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-slate-950 text-white min-h-screen">

<nav class="flex justify-between items-center px-8 py-5 border-b border-slate-800">
    <a th:href="@{/}" class="text-2xl font-bold">D3FENDer</a>
    <div class="space-x-6">
        <a th:href="@{/}" class="hover:text-blue-400">Home</a>
        <a th:href="@{/assessment}" class="hover:text-blue-400">Assessment</a>
        <a th:href="@{/login}" class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-700">Login</a>
    </div>
</nav>

<main class="flex justify-center items-center py-20">
    <div class="w-full max-w-md bg-slate-900 p-8 rounded-2xl shadow-lg border border-slate-800">

        <h1 class="text-3xl font-bold mb-6 text-center">Create Account</h1>

        <div th:if="${registrationError}" class="mb-4 bg-red-900/50 text-red-200 p-3 rounded-lg">
            <span th:text="${registrationError}"></span>
        </div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="space-y-5">
            <div>
                <label class="block mb-2 text-sm">Username</label>
                <input type="text" th:field="*{username}"
                       class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-red-400 text-sm mt-1"></p>
            </div>

            <div>
                <label class="block mb-2 text-sm">Email</label>
                <input type="email" th:field="*{email}"
                       class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-400 text-sm mt-1"></p>
            </div>

            <div>
                <label class="block mb-2 text-sm">Password</label>
                <input type="password" th:field="*{password}"
                       class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-400 text-sm mt-1"></p>
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 py-3 rounded-lg font-semibold hover:bg-blue-700">
                Register
            </button>
        </form>

        <p class="text-center text-slate-400 mt-6">
            Already have an account?
            <a th:href="@{/login}" class="text-blue-400 hover:underline">Login here</a>
        </p>
    </div>
</main>

</body>
</html>
