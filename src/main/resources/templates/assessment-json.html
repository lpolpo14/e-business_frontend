<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>JSON Assessment - D3FENDer</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-slate-950 text-white min-h-screen">

<nav class="flex justify-between items-center px-8 py-5 border-b border-slate-800">
    <a th:href="@{/}" class="text-2xl font-bold">D3FENDer</a>

    <div class="space-x-6">
        <a th:href="@{/}" class="hover:text-blue-400">Home</a>
        <a th:href="@{/dashboard}" class="hover:text-blue-400">Dashboard</a>

        <form th:action="@{/logout}" method="post" class="inline">
            <button type="submit" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700">
                Logout
            </button>
        </form>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-8 py-16">
    <div class="mb-8">
        <span class="inline-block mb-4 text-xs bg-yellow-500 text-black px-3 py-1 rounded-full font-bold">
            PRO
        </span>

        <h1 class="text-4xl font-bold mb-4">JSON Security Assessment</h1>

        <p class="text-slate-400">
            Paste structured JSON data describing your organization's threat context,
            defensive controls, and defensive capabilities.
        </p>
    </div>

    <form th:action="@{/assessment/json}" th:object="${assessmentRequest}" method="post" class="space-y-6">
        <div>
            <div class="flex items-center justify-between mb-3">
                <label class="block text-sm font-medium text-slate-300">
                    Organization security JSON
                </label>

                <button type="button"
                        onclick="usePredefinedTemplate()"
                        class="bg-slate-800 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-700">
                    Use predefined template
                </button>
            </div>

        <textarea th:field="*{content}"
                      id="jsonInput"
                      rows="22"
                      class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
                      placeholder='{
  "metadata": {
    "organization": "Mike Corp"
  },
  "threat_context": {
    "remote_workforce": true,
    "handles_sensitive_data": true
  },
  "defensive_controls": {
    "network_security": {
      "firewall": false,
      "vpn": false
    }
  },
  "defensive_capabilities": {
    "authentication": {
      "multi-factor_authentication": false
    }
  }
}'></textarea>

            <p th:if="${#fields.hasErrors('content')}"
               th:errors="*{content}"
               class="text-red-400 text-sm mt-2"></p>
        </div>

        <div class="flex gap-4">
            <button type="submit"
                    class="bg-blue-600 px-6 py-3 rounded-lg font-semibold hover:bg-blue-700">
                Run JSON Assessment
            </button>

            <a th:href="@{/dashboard}"
               class="bg-slate-800 px-6 py-3 rounded-lg font-semibold hover:bg-slate-700">
                Back to Dashboard
            </a>
        </div>
    </form>
</main>

</body>

<script>
    function usePredefinedTemplate() {
        const template = {
            "metadata": {
                "organization": "Mike Corp",
                "assessor": "Michael"
            },
            "threat_context": {
                "involves_software_engineering": false,
                "public_web_application": false,
                "remote_workforce": true,
                "handles_sensitive_data": true
            },
            "defensive_controls": {
                "network_security": {
                    "firewall": false,
                    "vpn": false
                },
                "access_control": {
                    "identity_access_management": false
                },
                "detection": {
                    "security_monitoring": false
                },
                "identity": {
                    "session_credential_management": false
                },
                "endpoint_security": {
                    "antivirus": false
                }
            },
            "defensive_capabilities": {
                "authentication": {
                    "token_based_authentication": false,
                    "password_authentication": false,
                    "multi-factor_authentication": false,
                    "certificate_based_authentication": false
                },
                "credential_hardening": {
                    "certificate_pinning": false,
                    "credential_rotation": false,
                    "token_binding": false,
                    "revocation": false,
                    "scrubbing": false
                },
                "application_hardening": {
                    "dead_code_elimination": false,
                    "code_analysis": false,
                    "address_space_layout_randomization(aslr)": false,
                    "stack_frame_canary_validation": false,
                    "input_validation": false
                },
                "processes_and_policies": {
                    "password_policy": false
                },
                "detection": {
                    "user_behavior_analysis": false,
                    "remote_terminal": false
                },
                "file_security": {
                    "file_hashing": false,
                    "file_content_analysis": false,
                    "local_permissions": false,
                    "executable_allowlisting": true,
                    "disk_encryption": false
                },
                "deception": {
                    "decoy_environment": false
                },
                "communications_security": {
                    "message_encryption": false
                },
                "dns_security": {
                    "dns_allowlisting": false,
                    "dns_denylisting": false,
                    "dns_traffic_analysis": false
                },
                "database_security": {
                    "query_string_analysis": false
                },
                "application_security": {
                    "process_isolation": false
                }
            }
        };

        document.getElementById("jsonInput").value = JSON.stringify(template, null, 2);
    }
</script>
</html>
