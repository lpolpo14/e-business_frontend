<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Backend SBOM - D3FENDer</title>
</head>
<body class="bg-gray-950 text-white min-h-screen">

<main class="max-w-6xl mx-auto px-6 py-10">
    <a href="/admin/dashboard" class="text-blue-400 hover:underline">
        ← Back to Admin Dashboard
    </a>

    <h1 class="text-3xl font-bold mt-6 mb-2">Backend SBOM</h1>
    <p class="text-gray-400 mb-8">
        CycloneDX SBOM generated for the backend system.
    </p>

    <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
            <h2 class="text-sm text-gray-400">BOM Format</h2>
            <p class="text-xl font-semibold mt-2" th:text="${sbomSummary.bomFormat()}">CycloneDX</p>
        </div>

        <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
            <h2 class="text-sm text-gray-400">Spec Version</h2>
            <p class="text-xl font-semibold mt-2" th:text="${sbomSummary.specVersion()}">1.5</p>
        </div>

        <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
            <h2 class="text-sm text-gray-400">Components</h2>
            <p class="text-xl font-semibold mt-2" th:text="${sbomSummary.componentCount()}">0</p>
        </div>
    </section>

    <form th:action="@{/admin/sbom/analyze}" method="post" class="mb-8">
        <button type="submit"
                class="rounded-lg bg-green-600 px-5 py-3 text-white font-semibold hover:bg-green-700 transition">
            Analyze Backend SBOM
        </button>
    </form>

    <section class="bg-gray-900 rounded-xl p-6 border border-gray-800">
        <h2 class="text-2xl font-bold mb-4">Components</h2>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="text-gray-400 border-b border-gray-800">
                <tr>
                    <th class="py-3 pr-4">Name</th>
                    <th class="py-3 pr-4">Version</th>
                    <th class="py-3 pr-4">Type</th>
                    <th class="py-3 pr-4">Package URL</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="component : ${sbomSummary.components()}"
                    class="border-b border-gray-800">
                    <td class="py-3 pr-4" th:text="${component.name()}">name</td>
                    <td class="py-3 pr-4" th:text="${component.version()}">version</td>
                    <td class="py-3 pr-4" th:text="${component.type()}">type</td>
                    <td class="py-3 pr-4 text-sm text-gray-400" th:text="${component.purl()}">purl</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

</body>
</html>
