<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>D3FENDer</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>

<body class="bg-slate-950 text-white min-h-screen flex flex-col">


<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-1">

<!-- Content -->
<section class="max-w-4xl mx-auto text-center mt-16 px-8">

    <h1 class="text-4xl font-bold mb-6">
        Welcome to D3FENDer
    </h1>

    <p class="text-lg text-slate-400 mb-8">
        A threat-driven security assessment platform that identifies
        security gaps using the MITRE ATT&CK and D3FEND frameworks.
    </p>

    <div class="space-x-4">

        <!-- If NOT logged in -->
        <a th:if="${#authentication == null or #authentication.name == 'anonymousUser'}"
           th:href="@{/login}"
           class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">
            Get Started
        </a>

        <!-- If logged in -->
        <a th:if="${#authentication != null and #authentication.name != 'anonymousUser'}"
           th:href="@{/dashboard}"
           class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">
            Go to Dashboard
        </a>

    </div>

</section>
</main>


<div th:replace="~{fragments/footer :: footer}"></div>


</body>
</html>
