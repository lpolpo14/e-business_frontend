<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - D3FENDer</title>
</head>
<body class="bg-gray-950 text-white min-h-screen">

<main class="max-w-6xl mx-auto px-6 py-10">
    <h1 class="text-3xl font-bold mb-2">Admin Dashboard</h1>
    <p class="text-gray-400 mb-8">
        Administrative overview of the D3FENDer platform.
    </p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
        <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
            <h2 class="text-lg font-semibold text-gray-300">Registered Users</h2>
            <p class="text-4xl font-bold mt-3" th:text="${totalUsers}">0</p>
        </div>

        <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
            <h2 class="text-lg font-semibold text-gray-300">Backend SBOM Components</h2>
            <p class="text-4xl font-bold mt-3" th:text="${sbomSummary.componentCount()}">0</p>
        </div>
    </div>

    <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
        <h2 class="text-2xl font-bold mb-4">Backend SBOM</h2>

        <p class="text-gray-400 mb-6">
            View or analyze the backend system's pre-generated CycloneDX SBOM.
        </p>

        <div class="flex gap-4">
            <a href="/admin/sbom"
               class="rounded-lg bg-blue-600 px-5 py-3 text-white font-semibold hover:bg-blue-700 transition">
                View SBOM
            </a>

            <form th:action="@{/admin/sbom/analyze}" method="post">
                <button type="submit"
                        class="rounded-lg bg-green-600 px-5 py-3 text-white font-semibold hover:bg-green-700 transition">
                    Analyze SBOM
                </button>
            </form>
        </div>
    </div>
</main>

</body>
</html>
