<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - D3FENDer</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-slate-950 text-white min-h-screen">

<nav class="flex justify-between items-center px-8 py-5 border-b border-slate-800">
    <a th:href="@{/}" class="text-2xl font-bold">D3FENDer</a>
    <div class="space-x-6">
        <a th:href="@{/}" class="hover:text-blue-400">Home</a>
        <a th:href="@{/assessment}" class="hover:text-blue-400">Assessment</a>
        <form th:action="@{/logout}" method="post" class="inline">
            <button type="submit" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700">
                Logout
            </button>
        </form>
    </div>
</nav>

<main class="max-w-5xl mx-auto py-20 px-8">
    <h1 class="text-4xl font-bold mb-4">User Dashboard</h1>
    <p class="text-slate-400 mb-8">
        Welcome to your D3FENDer security assessment dashboard.
    </p>

    <a th:href="@{/assessment}"
       class="inline-block bg-blue-600 px-6 py-3 rounded-lg font-semibold hover:bg-blue-700">
        Start Security Assessment
    </a>
</main>

</body>
</html>
