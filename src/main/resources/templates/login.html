<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - D3FENDer</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-slate-950 text-white min-h-screen">

<nav class="flex justify-between items-center px-8 py-5 border-b border-slate-800">
    <a th:href="@{/}" class="text-2xl font-bold">D3FENDer</a>
    <div class="space-x-6">
        <a th:href="@{/}" class="hover:text-blue-400">Home</a>
        <a th:href="@{/assessment}" class="hover:text-blue-400">Assessment</a>
        <a th:href="@{/register}" class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-700">Register</a>
    </div>
</nav>

<main class="flex justify-center items-center py-20">
    <div class="w-full max-w-md bg-slate-900 p-8 rounded-2xl shadow-lg border border-slate-800">

        <h1 class="text-3xl font-bold mb-6 text-center">Login</h1>

        <div th:if="${param.error}" class="mb-4 bg-red-900/50 text-red-200 p-3 rounded-lg">
            Invalid username or password.
        </div>

        <div th:if="${param.registered}" class="mb-4 bg-green-900/50 text-green-200 p-3 rounded-lg">
            Registration successful. You can now login.
        </div>

        <form th:action="@{/login}" method="post" class="space-y-5">
            <div>
                <label class="block mb-2 text-sm">Username</label>
                <input type="text" name="username"
                       class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block mb-2 text-sm">Password</label>
                <input type="password" name="password"
                       class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 py-3 rounded-lg font-semibold hover:bg-blue-700">
                Login
            </button>
        </form>

        <p class="text-center text-slate-400 mt-6">
            No account?
            <a th:href="@{/register}" class="text-blue-400 hover:underline">Register here</a>
        </p>
    </div>
</main>

</body>
</html>
