spring.application.name=d3fender
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:d3fender}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

spring.thymeleaf.cache=false

server.port=${PORT:8080}
d3fender.api.base-url=${D3FENDER_API_BASE_URL:http://localhost:8000}

stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.basic-price-id=${STRIPE_BASIC_PRICE_ID}
app.base-url=http://localhost:${PORT:8080}

openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.base-url=https://api.openai.com/v1/responses
openai.temperature=0.2
openai.max-output-tokens=1200

d3fender.admin.username=${D3FENDER_ADMIN_USERNAME:admin}
d3fender.admin.email=${D3FENDER_ADMIN_EMAIL:admin@email.com}
d3fender.admin.password=${D3FENDER_ADMIN_PASSWORD:password}